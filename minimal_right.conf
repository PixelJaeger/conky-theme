conky.config = {

    use_xft = true,
    xftalpha = 1,
    override_utf8_locale = true,
    short_units = true,

    update_interval = 1,
    total_run_times = 0,

    own_window = true,
    own_window_type = 'normal',
    own_window_transparent = false,
    own_window_argb_value = 2,
    own_window_argb_visual = true,
    own_window_colour = '000000',
    own_window_hints = 'undecorated,sticky,skip_taskbar,skip_pager',

    double_buffer = true,

    minimum_size = '320 5',
    maximum_width = 310,
    max_text_width = 0,

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = true,

    stippled_borders = 5,
    border_inner_margin = 0,
    border_outer_margin = 0,
    border_width = 1,

    default_color = '00FC0D',
    default_shade_color = 'black',
    default_outline_color = 'black',

    alignment = 'top_right',

    gap_x = 1,
    gap_y = 1,

    no_buffers = true,
    uppercase = false,

    cpu_avg_samples = 1,
    net_avg_samples = 1,

    top_name_width = 18,
    top_cpu_separate = false,

    lua_load = 'weather.lua',

}

conky.text = [[
${font TerminessNerdFontMono-Regular:size= 11}${alignr}                                   < ${distribution} > Arch Linux --@
${alignr}                                                                                       < ${kernel} > Kernel --|   |
${alignr} < ${execi 3600 plasmashell --version | awk '{print "KDE Plasma " $2}'} > on < ${execi 3600 echo $XDG_SESSION_TYPE} > --'   |
${alignr}                                                                                                                  |
${alignr}                                                                                                         System --@
${alignr}                                                                                                        CPU --|   |
${alignr}< ${freq_g} Ghz > ${execi 3600 cat /proc/cpuinfo | grep -i 'Model name' -m 1 | cut -c14-18,22-29,38-43} --|   |   |
${alignr}                                                  < ${cpu cpu0}%  ${cpugraph 11,130 ffffff 6F98D0 -t} > --|   |   |
${alignr}                                                                        < ${top name 1}  ${top cpu 1} > --|   |   |
${alignr}                                                                        < ${top name 2}  ${top cpu 2} > --|   |   |
${alignr}                                                                        < ${top name 3}  ${top cpu 3} > --|   |   |
${alignr}                                                                        < ${top name 4}  ${top cpu 4} > --|   |   |
${alignr}                                                                        < ${top name 5}  ${top cpu 5} > --'   |   |
${alignr}                                                                                                              |   |
${alignr}                                                                                                        RAM --@   |
${alignr}                                                                                RAM: ${mem} / ${memmax} --|   |   |
${alignr}                                                   < ${memperc}%  ${memgraph 11,130 ffffff 6f98D0 -t} > --|   |   |
${alignr}                                                                    < ${top_mem name 1}  ${top mem 1} > --|   |   |
${alignr}                                                                    < ${top_mem name 2}  ${top mem 2} > --|   |   |
${alignr}                                                                    < ${top_mem name 3}  ${top mem 3} > --|   |   |
${alignr}                                                                    < ${top_mem name 4}  ${top mem 4} > --|   |   |
${alignr}                                                                    < ${top_mem name 5}  ${top mem 5} > --'   |   |
${alignr}                                                                                                              |   |
${alignr}                                                                                                      Other --@   |
${alignr}                         < ${execi 3600 ps -C command_name -e --no-headers | wc -l} > Running processes --|   |   |
${alignr}                                                 < ${execi 3600 pacman -Q | wc -l} > Packages installed --'   |   |
${alignr}                                                                                                              |   |
${alignr}                                                                                                     Drives --@   |
${alignr}                                                                   < ${fs_used /} / ${fs_size /} > root --|       |
${alignr}                                                                             < ${fs_bar 11,170 /} > --'   |       |
${alignr}                                                       < ${fs_used /stuff} / ${fs_size /stuff} > /stuff --'       |
${alignr}                                                                        < ${fs_bar 11,170 /stuff} > --'           |
${alignr}                                                                                                                  |
${alignr}                                                                                                         Wetter --@
${alignr}                                                                                                     Berlin --'   |
${alignr}                                                                 < ${lua_parse weather_status} > Status --|       |
${alignr}                                                              < ${lua_parse weather_temp} > Temperature --|       |
${alignr}                                                                < ${lua_parse weather_wind} > Windspeed --|       |
${alignr}                                                                < ${lua_parse weather_vis} > Visibility --|       |
${alignr}                                                          < ${lua_parse weather_precip} > Precipitation --'       |
]]
